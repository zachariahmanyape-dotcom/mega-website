<svg xmlns="http://www.w3.org/2000/svg" viewBox="30 35 440 425">
  <defs>
    <clipPath id="cp1-fav">
      <circle cx="250" cy="181.4" r="140"/>
    </clipPath>
    <clipPath id="cp12-fav" clipPathUnits="userSpaceOnUse">
      <circle cx="175" cy="311.3" r="140" clip-path="url(#cp1-fav)"/>
    </clipPath>
    <clipPath id="cp123-fav" clipPathUnits="userSpaceOnUse">
      <circle cx="325" cy="311.3" r="140" clip-path="url(#cp12-fav)"/>
    </clipPath>
  </defs>

  <!-- Triple intersection filled solid blue -->
  <rect x="0" y="0" width="500" height="500" fill="#0F52BA" clip-path="url(#cp123-fav)"/>

  <!-- Three circles with brand-coloured strokes -->
  <circle cx="250" cy="181.4" r="140" fill="none" stroke="#0F52BA" stroke-width="12"/>
  <circle cx="175" cy="311.3" r="140" fill="none" stroke="#A3E4DB" stroke-width="12"/>
  <circle cx="325" cy="311.3" r="140" fill="none" stroke="#FF6B6B" stroke-width="12"/>
</svg>
